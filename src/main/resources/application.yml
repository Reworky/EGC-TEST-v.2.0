spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:${DB_PATH:/data/game-platform-bot};AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false

app:
  club-name: ${APP_CLUB_NAME:Game Quest Club}
  support-username: ${APP_SUPPORT_USERNAME:support_manager}
  admin-ids: ${APP_ADMIN_IDS:${INITIAL_ADMIN_ID:}}
  moderator-ids: ${APP_MODERATOR_IDS:}
  admin-ids-raw: ${APP_ADMIN_IDS:}
  moderator-ids-raw: ${APP_MODERATOR_IDS:}
  initial-admin-id: ${INITIAL_ADMIN_ID:}
  bot-token: ${TELEGRAM_BOT_TOKEN:${BOT_TOKEN:}}
  bot-username: ${TELEGRAM_BOT_USERNAME:${BOT_USERNAME:}}
