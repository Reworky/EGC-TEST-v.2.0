server:
  port: ${SERVER_PORT:8090}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:${DB_PATH:/data/game-platform-bot};AUTO_SERVER=TRUE}
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  club-name: ${APP_CLUB_NAME:EXPERIENCE GAMING CLUB}
  support-username: ${APP_SUPPORT_USERNAME:support_manager}
  admin-ids: ${APP_ADMIN_IDS:${INITIAL_ADMIN_ID:}}
  moderator-ids: ${APP_MODERATOR_IDS:}
  admin-ids-raw: ${APP_ADMIN_IDS:}
  moderator-ids-raw: ${APP_MODERATOR_IDS:}
  initial-admin-id: ${INITIAL_ADMIN_ID:}
  required-channel-id: ${REQUIRED_CHANNEL_ID:}
  required-channel-username: ${REQUIRED_CHANNEL_USERNAME:@exgamingclub}
  required-channel-url: ${REQUIRED_CHANNEL_URL:}
  required-channel-title: ${REQUIRED_CHANNEL_TITLE:EXPERIENCE GAMING CLUB}
  bot-token: ${TELEGRAM_BOT_TOKEN:${BOT_TOKEN:}}
  bot-username: ${TELEGRAM_BOT_USERNAME:${BOT_USERNAME:}}
  jwt-secret: ${JWT_SECRET:change-me-in-production-must-be-32-chars}
  jwt-expiration-days: ${JWT_EXPIRATION_DAYS:30}
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
